<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }
    .heading-font { font-family: 'Playfair Display', serif; }
    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    }
    .input-field {
      background: #f7f5f2;
      border: 2px solid transparent;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .input-field:focus {
      border-color: #4f46e5;
      background: #fff;
    }
    .add-btn {
      background: #4f46e5;
      color: white;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
    }
    .add-btn:hover { background: #4338ca; }
    .add-btn:active { transform: scale(0.97); }

    .task-item {
      background: #fafaf9;
      border: 1.5px solid #ece9e3;
      border-radius: 14px;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .task-item:hover { border-color: #d4d0e8; box-shadow: 0 2px 12px rgba(79,70,229,0.08); }
    .task-item.done {
      background: #f4f7f4;
      border-color: #d1e8d4;
    }

    .checkbox-custom {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #c9c5d8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      background: white;
    }
    .checkbox-custom.checked {
      background: #22c55e;
      border-color: #22c55e;
    }
    .checkbox-custom:hover { border-color: #4f46e5; }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      border-radius: 8px;
      padding: 4px 8px;
      transition: color 0.15s, background 0.15s;
      font-size: 18px;
      line-height: 1;
    }
    .delete-btn:hover { color: #ef4444; background: #fef2f2; }

    .filter-btn {
      border-radius: 10px;
      border: none;
      padding: 6px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      color: #6b7280;
      background: transparent;
    }
    .filter-btn.active {
      background: #4f46e5;
      color: white;
      box-shadow: 0 2px 8px rgba(79,70,229,0.3);
    }
    .filter-btn:not(.active):hover { background: #ece9f8; color: #4f46e5; }

    .task-enter {
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .empty-state {
      color: #b0adb8;
      text-align: center;
      padding: 40px 0 20px;
    }

    .badge {
      background: #4f46e5;
      color: white;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      min-width: 22px;
      text-align: center;
      display: inline-block;
    }
  </style>
</head>
<body class="min-h-screen flex items-start justify-center py-10 px-4">
  <div id="root" class="w-full max-w-md"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    let nextId = 1;

    function TodoApp() {
      const [tasks, setTasks] = useState([
        { id: nextId++, text: 'Review database normalization notes', done: false },
        { id: nextId++, text: 'Finish hardware maintenance lab report', done: true },
        { id: nextId++, text: 'Study OSI model layers for exam', done: false },
      ]);
      const [input, setInput] = useState('');
      const [filter, setFilter] = useState('all'); // all | pending | completed
      const inputRef = useRef(null);

      const addTask = () => {
        const trimmed = input.trim();
        if (!trimmed) return;
        setTasks(prev => [{ id: nextId++, text: trimmed, done: false }, ...prev]);
        setInput('');
        inputRef.current.focus();
      };

      const toggleTask = (id) => {
        setTasks(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
      };

      const deleteTask = (id) => {
        setTasks(prev => prev.filter(t => t.id !== id));
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') addTask();
      };

      const filtered = tasks.filter(t => {
        if (filter === 'completed') return t.done;
        if (filter === 'pending') return !t.done;
        return true;
      });

      const pendingCount = tasks.filter(t => !t.done).length;
      const doneCount = tasks.filter(t => t.done).length;

      return (
        <div className="card p-7">
          {/* Header */}
          <div className="mb-6">
            <h1 className="heading-font text-3xl text-gray-800 mb-1">My Tasks</h1>
            <p className="text-sm text-gray-400">
              {pendingCount} remaining &nbsp;·&nbsp; {doneCount} completed
            </p>
          </div>

          {/* Input */}
          <div className="flex gap-2 mb-6">
            <input
              ref={inputRef}
              className="input-field flex-1 px-4 py-3 text-sm text-gray-700"
              type="text"
              placeholder="Add a new task..."
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKeyDown}
            />
            <button className="add-btn px-5 py-3 text-sm" onClick={addTask}>
              + Add
            </button>
          </div>

          {/* Filter tabs */}
          <div className="flex gap-1 bg-gray-100 rounded-xl p-1 mb-5">
            {['all', 'pending', 'completed'].map(f => (
              <button
                key={f}
                className={`filter-btn flex-1 capitalize ${filter === f ? 'active' : ''}`}
                onClick={() => setFilter(f)}
              >
                {f}
                {f === 'pending' && pendingCount > 0 && (
                  <span className="ml-1.5 badge">{pendingCount}</span>
                )}
              </button>
            ))}
          </div>

          {/* Task list */}
          <div className="flex flex-col gap-2">
            {filtered.length === 0 && (
              <div className="empty-state">
                <div className="text-4xl mb-3">{filter === 'completed' ? '🎉' : '✅'}</div>
                <p className="text-sm font-medium">
                  {filter === 'completed' ? 'No completed tasks yet.' : filter === 'pending' ? 'All tasks done!' : 'No tasks yet. Add one above!'}
                </p>
              </div>
            )}
            {filtered.map(task => (
              <div key={task.id} className={`task-item task-enter flex items-center gap-3 px-4 py-3 ${task.done ? 'done' : ''}`}>
                {/* Circle checkbox */}
                <div
                  className={`checkbox-custom ${task.done ? 'checked' : ''}`}
                  onClick={() => toggleTask(task.id)}
                >
                  {task.done && (
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  )}
                </div>

                {/* Task text */}
                <span
                  className={`flex-1 text-sm cursor-pointer select-none ${
                    task.done ? 'line-through text-gray-400' : 'text-gray-700'
                  }`}
                  onClick={() => toggleTask(task.id)}
                >
                  {task.text}
                </span>

                {/* Delete */}
                <button className="delete-btn" onClick={() => deleteTask(task.id)} title="Delete task">
                  ×
                </button>
              </div>
            ))}
          </div>

          {/* Footer clear button */}
          {doneCount > 0 && (
            <div className="mt-5 text-right">
              <button
                className="text-xs text-gray-400 hover:text-red-400 transition-colors cursor-pointer underline underline-offset-2"
                onClick={() => setTasks(prev => prev.filter(t => !t.done))}
              >
                Clear {doneCount} completed {doneCount === 1 ? 'task' : 'tasks'}
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<TodoApp />);
  </script>
</body>
</html>
